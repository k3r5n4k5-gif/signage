<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#003366">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>受付案内</title>

<style>

body{
    margin:0;
    background:#ffffff;
    font-family: "Noto Sans JP", sans-serif;
    overflow:hidden;
}

.container{
    display:flex;
    flex-direction:column;
    height:100vh;
}

/* 上部 */
.header{
    flex:4;
    background-image:url("background.png");
    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    position:relative;
}

.welcome{
    font-size:4vw;
    color:#003366;
    margin-top:120px;
    margin-bottom:20px;
    font-weight:500;
}

/* タイトル */
.title{
    font-size:8vw;
    color:#003366;
    margin-top:180px;
    margin-bottom:80px;
    position:relative;
}

.title::after{
    content:"";
    position:absolute;
    left:0;
    right:0;
    bottom:5px;   /* この値を調整 */
    height:2px;
    background:#003366;
}

/* 受付時間 */
.time{
    font-size:15vw;
    font-weight:bold;
    color:#003366;
    margin-top:-80px;
}

/* 時計エリア */
.clock{
    position:absolute;
    top:40px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    z-index:100;

    background:rgba(255,255,255,0.75);
    padding:20px 50px;
    border-radius:20px;
    backdrop-filter: blur(5px);
}

/* 日付 */
#date{
    font-size:5vw;
    font-weight:600;
    color:#003366;
    letter-spacing:3px;
    margin-bottom:10px;
}

/* 時刻 */
#time-display{
    font-size:10vw;
    font-weight:bold;
    color:#003366;
    line-height:1;
    letter-spacing:4px;
}

/* 中央動画 */
.video-area{
    flex:2;
    background:black;
}

.video-area video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* 下部ロゴ */
.footer{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    background:white;
}

.footer img{
    max-width:80%;
    max-height:80%;
}

</style>
</head>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/signage/service-worker.js');
}
</script>

<body>

<div class="container">

    <!-- 上部 -->
    <div class="header">

        <!-- 日付・時刻 -->
        <div class="clock">
            <div id="date"></div>
            <div id="time-display"></div>
        </div>

	<div class="welcome">
    いらっしゃいませ
	</div>

        <div class="title">
            受付時間のご案内
        </div>

        <div class="time">
            8:05～
        </div>

    </div>

    <!-- 中央動画 -->
    <div class="video-area">
        <video autoplay muted loop playsinline>
            <source src="pr.mp4" type="video/mp4">
        </video>
    </div>

    <!-- 下部ロゴ -->
    <div class="footer">
        <img src="logo.png">
    </div>

</div>

<script>

function updateClock() {

    const now = new Date();

    const week = ["日","月","火","水","木","金","土"];

    const date =
        now.getFullYear() + "/" +
        String(now.getMonth()+1).padStart(2,'0') + "/" +
        String(now.getDate()).padStart(2,'0') +
        " (" + week[now.getDay()] + ")";

    const time =
        String(now.getHours()).padStart(2,'0') + ":" +
        String(now.getMinutes()).padStart(2,'0') + ":" +
        String(now.getSeconds()).padStart(2,'0');

    document.getElementById("date").textContent = date;
    document.getElementById("time-display").textContent = time;
}

updateClock();
setInterval(updateClock,1000);

</script>

</body>
</html>
